<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
</head>
<body>
    <table border="1" cellpadding="10px" width="900px" align="center">
        <tr>
            <th colspan="2" style="text-align: center; font-size: 20px;">Registration Form</th>
        </tr>
        <tr>
            <td>Student Name</td>
            <td><input type="text" name="studentName"></td>
        </tr>
        <tr>
            <td>Father's Name</td>
            <td><input type="text" name="fatherName"></td>
        </tr>
        <tr>
            <td>Mother's Name</td>
            <td><input type="text" name="motherName"></td>
        </tr>
        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
            </td>
        </tr>
        <tr>
            <td>Date of Birth</td>
            <td><input type="date" name="dob"></td>
        </tr>
        <tr>
            <td>Address</td>
            <td><textarea name="address" rows="4" cols="30"></textarea></td>
        </tr>
        <tr>
            <td>Mobile Number</td>
            <td><input type="tel" name="mobileNumber"></td>
        </tr>
        <tr>
            <td>State</td>
            <td><input type="text" name="state"></td>
        </tr>
        <tr>
            <td>City</td>
            <td><input type="text" name="city"></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Submit"></td>
        </tr>
    </table>
</body>
</html>
