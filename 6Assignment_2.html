<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 2</title>
</head>
<body>
    <table border="1" cellpadding="5px" width="900px" align="center">
        <tr>
            <th colspan="4" style="text-align: center; font-size: 20px;">Registration Form<br><br></th>
        </tr>
        <tr>
            <td>Student Name</td>
            <td><input type="text" name="FirstName" placeholder="First Name"></td>
            <td><input type="text" name="MiddleName" placeholder="Middle Name"></td>
            <td><input type="text" name="LastName" placeholder="Last Name"></td>
        </tr>
        <tr>
            <td>Father's Name</td>
            <td><input type="text" name="fatherName" placeholder="Enter your Father's Name"></td>
            <td>Mother's Name</td>
            <td><input type="text" name="motherName" placeholder="Enter your Mother's Name"></td>
        </tr>
        <tr>
            <td>Date of Birth</td>
            <td><input type="date" name="dob"></td>
            <td>Gender</td>
            <td>
                Male<input type="radio" name="gender">
                Female<input type="radio" name="gender">
            </td>
        </tr>
        <tr>
            <td>Category</td>
            <td>
                Gen<input type="radio" name="category"> 
                OBC<input type="radio" name="category">
                SC/ST<input type="radio" name="category"> 
            </td>
            <td>Handicapped</td>
            <td>
                Yes<input type="radio">
                No<input type="radio">
            </td>
        </tr>
        <tr>
            <td>Ex-Serviceman</td>
            <td>
                Yes<input type="radio">
                No<input type="radio">
            </td>
            <td>EWS</td>
            <td>
                Yes<input type="radio">
                No<input type="radio">
            </td>
        </tr>
        <tr>
            <td>Email ID</td>
            <td><input type="text" name="emailid"></td>
            <td>Mobile No.</td>
            <td><input type="tel" name="mobilenumber"></td>
        </tr>
        <tr>
            <td>State</td>
            <td>
                <select>
							<option>Select any One</option>
							<option>Uttar Pradesh</option>
							<option>Madhya Pradesh</option>
						</select>
            </td>
            <td>City</td>
            <td>
                <select>
                    <option>Select any One</option>
							<option>Prayagraj</option>
							<option>Kanpur</option>
							<option>Bhopal</option>

                </select>
            </td>
        </tr>
        <tr>
            <td>Upload Photo</td>
            <td><input type="file"></td>
            <td>Upload Signature</td>
            <td><input type="file"></td>
        </tr>
        <tr>
            <td></td>
            <td colspan="3" align="center"><input type="button" value="Submit"></td>
        </tr>
    </table>    
</body>
</html>
